name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: MyFirstApp
  PROJECT_PATH: Config/MyFirstApp.xcodeproj

jobs:
  validate:
    name: Validate project
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec Config/project.yml

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_NAME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

  build:
    name: Build and Sign IPA
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec Config/project.yml

      - name: Check signing secrets
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${BUILD_CERTIFICATE_BASE64:-}" || -z "${P12_PASSWORD:-}" || -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Skip signed IPA export until secrets are configured
        if: steps.signing.outputs.available != 'true'
        run: echo "Signing secrets are missing, so only the validate job ran. Add BUILD_CERTIFICATE_BASE64, P12_PASSWORD, and BUILD_PROVISION_PROFILE_BASE64 to enable signed IPA export."

      - name: Install certificate and provisioning profile
        if: steps.signing.outputs.available == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          TEAM_ID_SECRET: ${{ secrets.TEAM_ID }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/build_profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          export CERT_PATH PROFILE_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["BUILD_CERTIFICATE_BASE64"])
          )
          Path(os.environ["PROFILE_PATH"]).write_bytes(
              base64.b64decode(os.environ["BUILD_PROVISION_PROFILE_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*\"\\(.*\\)\".*/\\1/p' | head -n 1)"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No code signing identity was found in the imported keychain." >&2
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")"
          APP_IDENTIFIER="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")"
          PROFILE_BUNDLE_ID="${APP_IDENTIFIER#*.}"
          PROJECT_BUNDLE_ID="$(awk '/PRODUCT_BUNDLE_IDENTIFIER:/ {print $2; exit}' Config/project.yml)"
          GET_TASK_ALLOW="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$PROFILE_PLIST")"

          if [[ -n "${TEAM_ID_SECRET:-}" && "$TEAM_ID_SECRET" != "$PROFILE_TEAM_ID" ]]; then
            echo "TEAM_ID secret does not match provisioning profile team identifier." >&2
            exit 1
          fi

          TEAM_ID="${TEAM_ID_SECRET:-$PROFILE_TEAM_ID}"

          if [[ "$PROFILE_BUNDLE_ID" == *"*" ]]; then
            PROFILE_PREFIX="${PROFILE_BUNDLE_ID%\*}"
            if [[ "$PROJECT_BUNDLE_ID" != "$PROFILE_PREFIX"* ]]; then
              echo "Configured PRODUCT_BUNDLE_IDENTIFIER ($PROJECT_BUNDLE_ID) is outside the provisioning profile scope ($PROFILE_BUNDLE_ID)." >&2
              exit 1
            fi
            BUNDLE_ID="$PROJECT_BUNDLE_ID"
          else
            BUNDLE_ID="$PROFILE_BUNDLE_ID"
          fi

          if [[ "$GET_TASK_ALLOW" == "true" ]]; then
            EXPORT_METHOD="development"
          elif /usr/libexec/PlistBuddy -c 'Print :ProvisionsAllDevices' "$PROFILE_PLIST" >/dev/null 2>&1; then
            EXPORT_METHOD="enterprise"
          elif /usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices:0' "$PROFILE_PLIST" >/dev/null 2>&1; then
            EXPORT_METHOD="ad-hoc"
          else
            EXPORT_METHOD="app-store"
          fi

          mv "$HOME/Library/MobileDevice/Provisioning Profiles/$(basename "$PROFILE_PATH")" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "TEAM_ID=$TEAM_ID"
            echo "BUNDLE_ID=$BUNDLE_ID"
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "EXPORT_METHOD=$EXPORT_METHOD"
            echo "ARCHIVE_PATH=$RUNNER_TEMP/$APP_NAME.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/output"
          } >> "$GITHUB_ENV"

      - name: Archive app
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_NAME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            clean archive

      - name: Export IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$SIGNING_IDENTITY</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa
          path: ${{ runner.temp }}/output/*.ipa
          retention-days: 7

      - name: Cleanup signing data
        if: always() && steps.signing.outputs.available == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "${KEYCHAIN_PATH}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
