name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: MyFirstApp
  PROJECT_PATH: Config/MyFirstApp.xcodeproj
  IPA_NAME: Resonance
  IPA_ARTIFACT_NAME: resonance-ipa

jobs:
  validate:
    name: Validate project
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec Config/project.yml

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_NAME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

  build:
    name: Build IPA
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec Config/project.yml

      - name: Check signing secrets
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${BUILD_CERTIFICATE_BASE64:-}" || -z "${P12_PASSWORD:-}" || -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install certificate and provisioning profile
        id: install_signing
        continue-on-error: true
        if: steps.signing.outputs.available == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          TEAM_ID_SECRET: ${{ secrets.TEAM_ID }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          CERT_PEM_PATH="$RUNNER_TEMP/build_certificate.pem"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/build_profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          export CERT_PATH PROFILE_PATH

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["BUILD_CERTIFICATE_BASE64"])
          )
          Path(os.environ["PROFILE_PATH"]).write_bytes(
              base64.b64decode(os.environ["BUILD_PROVISION_PROFILE_BASE64"])
          )
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN_PATH"
          if openssl pkcs12 -help 2>&1 | grep -q -- ' -legacy'; then
            openssl pkcs12 -legacy -in "$CERT_PATH" -clcerts -nokeys -passin "pass:$P12_PASSWORD" -out "$CERT_PEM_PATH"
          else
            openssl pkcs12 -in "$CERT_PATH" -clcerts -nokeys -passin "pass:$P12_PASSWORD" -out "$CERT_PEM_PATH"
          fi
          CERT_IMPORT_OUTPUT="$(security import "$CERT_PEM_PATH" -A -k "$KEYCHAIN_PATH" 2>&1)" || CERT_IMPORT_STATUS=$?
          if [[ "${CERT_IMPORT_STATUS:-0}" -ne 0 && "$CERT_IMPORT_OUTPUT" != *"already exists"* ]]; then
            echo "$CERT_IMPORT_OUTPUT" >&2
            exit "${CERT_IMPORT_STATUS}"
          fi
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" 2>&1 | awk -F '\"' '/\"/ {print $2; exit}')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No code signing identity was found in the imported keychain." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")"
          APP_IDENTIFIER="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")"
          PROFILE_BUNDLE_ID="${APP_IDENTIFIER#*.}"
          PROJECT_BUNDLE_ID="$(awk '/PRODUCT_BUNDLE_IDENTIFIER:/ {print $2; exit}' Config/project.yml)"
          GET_TASK_ALLOW="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$PROFILE_PLIST")"

          if [[ -n "${TEAM_ID_SECRET:-}" && "$TEAM_ID_SECRET" != "$PROFILE_TEAM_ID" ]]; then
            echo "TEAM_ID secret does not match provisioning profile team identifier." >&2
            exit 1
          fi

          TEAM_ID="${TEAM_ID_SECRET:-$PROFILE_TEAM_ID}"

          if [[ "$PROFILE_BUNDLE_ID" == *"*" ]]; then
            PROFILE_PREFIX="${PROFILE_BUNDLE_ID%\*}"
            if [[ "$PROJECT_BUNDLE_ID" != "$PROFILE_PREFIX"* ]]; then
              echo "Configured PRODUCT_BUNDLE_IDENTIFIER ($PROJECT_BUNDLE_ID) is outside the provisioning profile scope ($PROFILE_BUNDLE_ID)." >&2
              exit 1
            fi
            BUNDLE_ID="$PROJECT_BUNDLE_ID"
          else
            BUNDLE_ID="$PROFILE_BUNDLE_ID"
          fi

          if [[ "$GET_TASK_ALLOW" == "true" ]]; then
            EXPORT_METHOD="development"
          elif /usr/libexec/PlistBuddy -c 'Print :ProvisionsAllDevices' "$PROFILE_PLIST" >/dev/null 2>&1; then
            EXPORT_METHOD="enterprise"
          elif /usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices:0' "$PROFILE_PLIST" >/dev/null 2>&1; then
            EXPORT_METHOD="ad-hoc"
          else
            EXPORT_METHOD="app-store"
          fi

          mv "$HOME/Library/MobileDevice/Provisioning Profiles/$(basename "$PROFILE_PATH")" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "TEAM_ID=$TEAM_ID"
            echo "BUNDLE_ID=$BUNDLE_ID"
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "EXPORT_METHOD=$EXPORT_METHOD"
            echo "ARCHIVE_PATH=$RUNNER_TEMP/$APP_NAME.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/output"
          } >> "$GITHUB_ENV"

      - name: Build IPA package
        env:
          SIGNING_AVAILABLE: ${{ steps.signing.outputs.available }}
          SIGNING_SETUP_RESULT: ${{ steps.install_signing.outcome }}
        run: |
          set -euo pipefail

          EXPORT_PATH="${EXPORT_PATH:-$RUNNER_TEMP/output}"
          IPA_PATH="$EXPORT_PATH/$IPA_NAME.ipa"
          DERIVED_DATA_PATH="$RUNNER_TEMP/DerivedDataUnsigned"

          build_unsigned_ipa() {
            rm -rf "$DERIVED_DATA_PATH" "$EXPORT_PATH"
            mkdir -p "$EXPORT_PATH/Payload"

            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$APP_NAME" \
              -configuration Release \
              -destination generic/platform=iOS \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_ID:-$(awk '/PRODUCT_BUNDLE_IDENTIFIER:/ {print $2; exit}' Config/project.yml)}" \
              clean build

            APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products/Release-iphoneos" -maxdepth 1 -name '*.app' | head -n 1)"
            if [[ -z "$APP_PATH" ]]; then
              echo "Unsigned .app bundle was not produced." >&2
              exit 1
            fi

            cp -R "$APP_PATH" "$EXPORT_PATH/Payload/"
            rm -f "$IPA_PATH"
            (
              cd "$EXPORT_PATH"
              /usr/bin/zip -qry "$IPA_PATH" Payload
            )

            echo "PACKAGE_MODE=unsigned" >> "$GITHUB_ENV"
          }

          if [[ "$SIGNING_AVAILABLE" == "true" && "$SIGNING_SETUP_RESULT" == "success" ]]; then
            set +e
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$APP_NAME" \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath "$ARCHIVE_PATH" \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
              OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
              clean archive
            ARCHIVE_STATUS=$?
            set -e

            if [[ $ARCHIVE_STATUS -eq 0 ]]; then
              export EXPORT_METHOD SIGNING_IDENTITY TEAM_ID BUNDLE_ID PROFILE_NAME
              python3 -c "import os, plistlib; plistlib.dump({'method': os.environ['EXPORT_METHOD'], 'signingStyle': 'manual', 'signingCertificate': os.environ['SIGNING_IDENTITY'], 'teamID': os.environ['TEAM_ID'], 'provisioningProfiles': {os.environ['BUNDLE_ID']: os.environ['PROFILE_NAME']}}, open('ExportOptions.plist', 'wb'))"

              rm -rf "$EXPORT_PATH"
              xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportPath "$EXPORT_PATH" \
                -exportOptionsPlist ExportOptions.plist

              EXPORTED_IPA="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' | head -n 1)"
              if [[ -z "$EXPORTED_IPA" ]]; then
                echo "Signed export did not produce an IPA." >&2
                exit 1
              fi
              if [[ "$EXPORTED_IPA" != "$IPA_PATH" ]]; then
                mv "$EXPORTED_IPA" "$IPA_PATH"
              fi

              echo "PACKAGE_MODE=signed" >> "$GITHUB_ENV"
            else
              echo "Signed archive failed; generating unsigned IPA fallback for Sideloadly." >&2
              build_unsigned_ipa
            fi
          else
            echo "Signing inputs are unavailable or invalid; generating unsigned IPA for Sideloadly." >&2
            build_unsigned_ipa
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/output/*.ipa
          retention-days: 7

      - name: Cleanup signing data
        if: always() && steps.signing.outputs.available == 'true'
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "${KEYCHAIN_PATH}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
